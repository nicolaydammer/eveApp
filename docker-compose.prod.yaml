name: eveapp

services:
  php:
    image: serversideup/php:8.4-fpm-nginx
    restart: unless-stopped
    environment:
      PHP_OPCACHE_ENABLE: '1'
      SSL_MODE: 'off'
    ports:
      - '${HOST_HTTP_PORT:-8080}:8080'
    volumes:
      # Users define APP_SOURCE_DIR in their .env to point to their app location
      - ${APP_SOURCE_DIR}:/var/www/html
    depends_on:
      database:
        condition: service_healthy
      redis:
        condition: service_healthy
      reverb:
        condition: service_healthy
  horizon:
    image: serversideup/php:8.4-fpm-nginx
    restart: unless-stopped
    command:
      - php
      - /var/www/html/artisan
      - horizon
    stop_signal: SIGTERM
    volumes:
      - ${APP_SOURCE_DIR}:/var/www/html
    depends_on:
      php:
        condition: service_started
    healthcheck:
      start_period: 10s
      test:
        - CMD
        - healthcheck-horizon

  redis:
    image: redis:alpine
    restart: unless-stopped
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD}"]
    ports:
      - '${FORWARD_REDIS_PORT:-6379}:6379'
    volumes:
      # Named volume or a host path defined by the user
      - ${REDIS_DATA_DIR:-prod-redis-data}:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      retries: 3
      timeout: 5s

  database:
    image: postgres:18-alpine
    restart: unless-stopped
    ports:
      - '${FORWARD_DB_PORT:-5432}:5432'
    environment:
      POSTGRES_DB: ${DB_DATABASE}
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      # Named volume or a host path defined by the user
      - ${DB_DATA_DIR:-prod-pgsql-data}:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-q", "-d", "${DB_DATABASE}", "-U", "${DB_USERNAME}"]
      retries: 3
      timeout: 5s

  reverb:
    command:
      - php
      - /var/www/html/artisan
      - '--port=8081'
      - reverb:start
    environment:
      UID: '${PUID:-1000}'
      GID: '${PGID:-1000}'
    healthcheck:
      start_period: 10s
      test:
        - CMD
        - healthcheck-reverb
    image: serversideup/php:8.4-fpm-nginx
    ports:
      - '${FORWARD_REVERB_PORT:-8081}:8081'
    stop_signal: SIGTERM
    volumes:
      - ${APP_SOURCE_DIR}:/var/www/html


volumes:
  # Fallback named volumes if the user doesn't map a direct local folder for data
  prod-redis-data:
  prod-pgsql-data: